<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetLog AI</title>
<style>
  :root {
    --purple: #7C3AED;
    --purple-light: #A78BFA;
    --purple-dark: #5B21B6;
    --yellow: #FBBF24;
    --yellow-light: #FEF3C7;
    --bg: #F9F5FF;
    --card: #FFFFFF;
    --text: #1F2937;
    --text-light: #6B7280;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(124,58,237,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }
  header h1 { font-size: 1.6rem; font-weight: 700; }
  header h1 span { color: var(--yellow); }
  header p { font-size: 0.85rem; opacity: 0.85; }
  .logo { font-size: 2rem; }

  nav {
    background: white;
    display: flex;
    gap: 4px;
    padding: 8px 16px;
    border-bottom: 2px solid #EDE9FE;
    overflow-x: auto;
  }
  nav button {
    padding: 10px 20px;
    border: none;
    background: transparent;
    color: var(--text-light);
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  nav button:hover { background: #EDE9FE; color: var(--purple); }
  nav button.active { background: var(--purple); color: white; }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid #EDE9FE;
  }
  .card h2 {
    font-size: 1.15rem;
    margin-bottom: 16px;
    color: var(--purple);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; }

  .pet-card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    border: 2px solid #EDE9FE;
    cursor: pointer;
    transition: all 0.2s;
  }
  .pet-card:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: var(--shadow); }
  .pet-card .pet-icon { font-size: 2.5rem; margin-bottom: 8px; }
  .pet-card h3 { font-size: 1.1rem; color: var(--purple-dark); }
  .pet-card p { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; }
  .pet-card .badge {
    display: inline-block;
    background: var(--yellow-light);
    color: #92400E;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 8px;
  }

  .add-card {
    background: #EDE9FE;
    border: 2px dashed var(--purple-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 160px;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.2s;
  }
  .add-card:hover { background: #DDD6FE; }
  .add-card .icon { font-size: 2rem; color: var(--purple); }
  .add-card p { color: var(--purple); font-weight: 600; margin-top: 8px; }

  form { display: flex; flex-direction: column; gap: 12px; }
  label { font-size: 0.85rem; font-weight: 600; color: var(--text-light); }
  input, select, textarea {
    padding: 10px 14px;
    border: 2px solid #E5E7EB;
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--purple);
  }
  textarea { resize: vertical; min-height: 60px; }

  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--purple); color: white; }
  .btn-primary:hover { background: var(--purple-dark); }
  .btn-yellow { background: var(--yellow); color: #78350F; }
  .btn-yellow:hover { background: #F59E0B; }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
  .btn-danger { background: #FEE2E2; color: #991B1B; }
  .btn-danger:hover { background: #FECACA; }

  .timeline { position: relative; padding-left: 24px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 8px; top: 0; bottom: 0;
    width: 2px;
    background: #EDE9FE;
  }
  .timeline-item {
    position: relative;
    margin-bottom: 16px;
    padding: 14px 16px;
    background: #FAFAFE;
    border-radius: 12px;
    border-left: 3px solid var(--purple);
  }
  .timeline-item .date { font-size: 0.75rem; color: var(--text-light); font-weight: 600; }
  .timeline-item .type-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
  }
  .type-badge.vet_visit { background: #DBEAFE; color: #1E40AF; }
  .type-badge.vaccination { background: #D1FAE5; color: #065F46; }
  .type-badge.weight { background: #FEF3C7; color: #92400E; }
  .timeline-item p { font-size: 0.9rem; margin-top: 4px; }

  .activity-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: #FAFAFE;
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .activity-item .icon { font-size: 1.6rem; }
  .activity-item .info { flex: 1; }
  .activity-item .info h4 { font-size: 0.95rem; }
  .activity-item .info p { font-size: 0.8rem; color: var(--text-light); }
  .activity-item .duration {
    background: var(--purple);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .feed-item {
    padding: 14px;
    background: #FAFAFE;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .feed-item .time {
    background: var(--yellow);
    color: #78350F;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 6px 12px;
    border-radius: 10px;
    min-width: 64px;
    text-align: center;
  }
  .feed-item .info h4 { font-size: 0.95rem; }
  .feed-item .info p { font-size: 0.8rem; color: var(--text-light); }

  /* Chat */
  .chat-container { display: flex; flex-direction: column; height: calc(100vh - 220px); }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 0.92rem; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: var(--purple); color: white; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: white; border: 1px solid #EDE9FE; border-bottom-left-radius: 4px; }
  .chat-input-bar {
    display: flex;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid #EDE9FE;
  }
  .chat-input-bar input { flex: 1; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-light);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state h3 { color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 0.9rem; }

  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 180px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 28px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 { margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  @media (max-width: 640px) {
    header { padding: 16px; }
    main { padding: 16px 10px 80px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🐾</div>
  <div>
    <h1>Pet<span>Log</span> AI</h1>
    <p>Your pet's care companion</p>
  </div>
</header>

<nav id="nav">
  <button class="active" data-tab="pets">🐾 Pets</button>
  <button data-tab="health">💊 Health</button>
  <button data-tab="feeding">🍽️ Feeding</button>
  <button data-tab="activities">🎾 Activities</button>
  <button data-tab="chat">💬 Chat</button>
</nav>

<main>
  <!-- Pets Tab -->
  <div id="tab-pets" class="tab-content active">
    <div class="grid" id="pets-grid"></div>
  </div>

  <!-- Health Tab -->
  <div id="tab-health" class="tab-content">
    <div class="card">
      <h2>💊 Health Timeline</h2>
      <div class="row" style="margin-bottom:16px">
        <select id="health-pet-select"><option value="">Select a pet...</option></select>
        <select id="health-type">
          <option value="vet_visit">Vet Visit</option>
          <option value="vaccination">Vaccination</option>
          <option value="weight">Weight Check</option>
        </select>
        <input type="date" id="health-date" />
      </div>
      <div class="row" style="margin-bottom:16px">
        <input type="text" id="health-notes" placeholder="Notes..." />
        <input type="number" id="health-weight" placeholder="Weight (kg)" step="0.1" style="display:none" />
      </div>
      <div class="row" style="margin-bottom:16px">
        <input type="text" id="health-vet" placeholder="Vet name (optional)" />
        <input type="text" id="health-vaccine" placeholder="Vaccine (optional)" />
      </div>
      <button class="btn btn-primary" onclick="addHealthEntry()">Add Health Record</button>
    </div>
    <div id="health-timeline" class="timeline"></div>
  </div>

  <!-- Feeding Tab -->
  <div id="tab-feeding" class="tab-content">
    <div class="card">
      <h2>🍽️ Feeding Schedule</h2>
      <div class="row" style="margin-bottom:12px">
        <select id="feed-pet-select"><option value="">Select a pet...</option></select>
        <input type="time" id="feed-time" />
      </div>
      <div class="row" style="margin-bottom:12px">
        <input type="text" id="feed-diet" placeholder="Diet / Food" />
        <input type="text" id="feed-amount" placeholder="Amount (e.g. 1 cup)" />
      </div>
      <div class="row" style="margin-bottom:16px">
        <label><input type="checkbox" id="feed-recurring" /> Recurring</label>
      </div>
      <button class="btn btn-primary" onclick="addFeedingEntry()">Add Feeding</button>
    </div>
    <div id="feeding-list"></div>
  </div>

  <!-- Activities Tab -->
  <div id="tab-activities" class="tab-content">
    <div class="card">
      <h2>🎾 Activities</h2>
      <div class="row" style="margin-bottom:12px">
        <select id="act-pet-select"><option value="">Select a pet...</option></select>
        <select id="act-type">
          <option value="walk">🚶 Walk</option>
          <option value="play">🎾 Play</option>
          <option value="training">🎓 Training</option>
        </select>
      </div>
      <div class="row" style="margin-bottom:16px">
        <input type="date" id="act-date" />
        <input type="number" id="act-duration" placeholder="Duration (min)" />
      </div>
      <input type="text" id="act-notes" placeholder="Notes..." style="margin-bottom:16px;width:100%" />
      <button class="btn btn-primary" onclick="addActivityEntry()">Log Activity</button>
    </div>
    <div id="activities-list"></div>
  </div>

  <!-- Chat Tab -->
  <div id="tab-chat" class="tab-content">
    <div class="card chat-container">
      <h2>💬 Ask PetLog AI</h2>
      <div class="chat-messages" id="chat-messages">
        <div class="msg assistant">Hi there! 🐾 I'm your PetLog AI assistant. Ask me anything about pet care, health, feeding, or training!</div>
      </div>
      <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="Ask about your pet..." onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="btn btn-primary" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</main>

<!-- Add Pet Modal -->
<div class="modal-overlay" id="pet-modal">
  <div class="modal">
    <h2>🐾 Add New Pet</h2>
    <form onsubmit="event.preventDefault(); addPet();">
      <input type="text" id="pet-name" placeholder="Name" required />
      <select id="pet-species" required>
        <option value="">Species...</option>
        <option value="dog">🐕 Dog</option>
        <option value="cat">🐈 Cat</option>
        <option value="bird">🐦 Bird</option>
        <option value="fish">🐠 Fish</option>
        <option value="rabbit">🐇 Rabbit</option>
        <option value="hamster">🐹 Hamster</option>
        <option value="reptile">🦎 Reptile</option>
        <option value="other">🐾 Other</option>
      </select>
      <input type="text" id="pet-breed" placeholder="Breed" />
      <input type="date" id="pet-birthday" />
      <div class="modal-actions">
        <button type="button" class="btn" style="background:#E5E7EB" onclick="closePetModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Add Pet</button>
      </div>
    </form>
  </div>
</div>

<script>
const API = '';
let chatHistory = [];

// --- Navigation ---
document.querySelectorAll('#nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab !== 'pets') refreshPetSelects();
  });
});

// --- Species Icons ---
const ICONS = { dog:'🐕', cat:'🐈', bird:'🐦', fish:'🐠', rabbit:'🐇', hamster:'🐹', reptile:'🦎', other:'🐾' };

// --- Pets ---
function renderPets(pets) {
  const grid = document.getElementById('pets-grid');
  if (!pets.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🐾</div>
        <h3>No pets yet</h3>
        <p>Add your first furry, feathered, or scaly friend!</p>
      </div>
      <div class="add-card" onclick="openPetModal()">
        <div class="icon">+</div>
        <p>Add Pet</p>
      </div>`;
    return;
  }
  grid.innerHTML = pets.map(p => `
    <div class="pet-card">
      <div class="pet-icon">${ICONS[p.species]||'🐾'}</div>
      <h3>${p.name}</h3>
      <p>${p.breed || p.species}</p>
      ${p.birthday ? `<p>Born: ${p.birthday}</p>` : ''}
      <span class="badge">${p.species}</span>
      <div style="margin-top:12px;display:flex;gap:6px">
        <button class="btn btn-danger btn-sm" onclick="deletePet('${p.id}')">Remove</button>
      </div>
    </div>
  `).join('') + `<div class="add-card" onclick="openPetModal()"><div class="icon">+</div><p>Add Pet</p></div>`;
}

async function loadPets() {
  const r = await fetch(API + '/api/pets');
  renderPets(await r.json());
}

async function addPet() {
  const name = document.getElementById('pet-name').value.trim();
  const species = document.getElementById('pet-species').value;
  const breed = document.getElementById('pet-breed').value.trim();
  const birthday = document.getElementById('pet-birthday').value;
  if (!name || !species) return;
  await fetch(API + '/api/pets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, species, breed, birthday })
  });
  closePetModal();
  loadPets();
}

async function deletePet(id) {
  if (!confirm('Remove this pet?')) return;
  await fetch(API + '/api/pets?id=' + id, { method: 'DELETE' });
  loadPets();
}

function openPetModal() {
  document.getElementById('pet-modal').classList.add('open');
  document.getElementById('pet-name').value = '';
  document.getElementById('pet-species').value = '';
  document.getElementById('pet-breed').value = '';
  document.getElementById('pet-birthday').value = '';
}
function closePetModal() { document.getElementById('pet-modal').classList.remove('open'); }

// --- Pet Selects ---
async function refreshPetSelects() {
  const r = await fetch(API + '/api/pets');
  const pets = await r.json();
  const options = pets.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  ['health-pet-select','feed-pet-select','act-pet-select'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="">Select a pet...</option>' + options;
  });
}

// --- Health ---
document.getElementById('health-type').addEventListener('change', e => {
  document.getElementById('health-weight').style.display = e.target.value === 'weight' ? 'block' : 'none';
});

async function addHealthEntry() {
  const petId = document.getElementById('health-pet-select').value;
  if (!petId) return alert('Select a pet');
  const type = document.getElementById('health-type').value;
  const date = document.getElementById('health-date').value;
  const notes = document.getElementById('health-notes').value;
  const body = { petId, type, date, notes };
  if (type === 'weight') body.weight = parseFloat(document.getElementById('health-weight').value) || undefined;
  if (type === 'vet_visit') body.vetName = document.getElementById('health-vet').value;
  if (type === 'vaccination') body.vaccine = document.getElementById('health-vaccine').value;
  await fetch(API + '/api/health', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  loadHealthTimeline(petId);
}

async function loadHealthTimeline(petId) {
  if (!petId) return;
  const r = await fetch(API + '/api/health?petId=' + petId);
  const entries = await r.json();
  const el = document.getElementById('health-timeline');
  if (!entries.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><h3>No records yet</h3><p>Add your first health entry above</p></div>';
    return;
  }
  el.innerHTML = entries.map(e => `
    <div class="timeline-item">
      <div>
        <span class="date">${e.date}</span>
        <span class="type-badge ${e.type}">${e.type.replace('_',' ')}</span>
      </div>
      <p>${e.notes}${e.weight ? ` — ${e.weight}kg` : ''}${e.vetName ? ` — Dr. ${e.vetName}` : ''}${e.vaccine ? ` — ${e.vaccine}` : ''}</p>
    </div>
  `).join('');
}

document.getElementById('health-pet-select').addEventListener('change', e => {
  loadHealthTimeline(e.target.value);
});

// --- Feeding ---
async function addFeedingEntry() {
  const petId = document.getElementById('feed-pet-select').value;
  if (!petId) return alert('Select a pet');
  const body = {
    petId,
    time: document.getElementById('feed-time').value,
    diet: document.getElementById('feed-diet').value,
    amount: document.getElementById('feed-amount').value,
    recurring: document.getElementById('feed-recurring').checked,
    days: []
  };
  await fetch(API + '/api/feeding', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  loadFeedingList(petId);
}

async function loadFeedingList(petId) {
  if (!petId) return;
  const r = await fetch(API + '/api/feeding?petId=' + petId);
  const entries = await r.json();
  const el = document.getElementById('feeding-list');
  if (!entries.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🍽️</div><h3>No feeding schedules</h3><p>Add a feeding time above</p></div>';
    return;
  }
  el.innerHTML = entries.map(e => `
    <div class="feed-item">
      <div class="time">${e.time}</div>
      <div class="info">
        <h4>${e.diet}</h4>
        <p>${e.amount}${e.recurring ? ' (recurring)' : ''}</p>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteFeed('${e.id}','${petId}')">×</button>
    </div>
  `).join('');
}

async function deleteFeed(id, petId) {
  await fetch(API + '/api/feeding?id=' + id, { method: 'DELETE' });
  loadFeedingList(petId);
}

document.getElementById('feed-pet-select').addEventListener('change', e => {
  loadFeedingList(e.target.value);
});

// --- Activities ---
const ACT_ICONS = { walk:'🚶', play:'🎾', training:'🎓' };

async function addActivityEntry() {
  const petId = document.getElementById('act-pet-select').value;
  if (!petId) return alert('Select a pet');
  await fetch(API + '/api/activities', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      petId,
      type: document.getElementById('act-type').value,
      date: document.getElementById('act-date').value,
      duration: parseInt(document.getElementById('act-duration').value) || 0,
      notes: document.getElementById('act-notes').value
    })
  });
  loadActivities(petId);
}

async function loadActivities(petId) {
  if (!petId) return;
  const r = await fetch(API + '/api/activities?petId=' + petId);
  const entries = await r.json();
  const el = document.getElementById('activities-list');
  if (!entries.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🎾</div><h3>No activities logged</h3><p>Log your first walk, play, or training session!</p></div>';
    return;
  }
  el.innerHTML = entries.map(e => `
    <div class="activity-item">
      <div class="icon">${ACT_ICONS[e.type]||'🐾'}</div>
      <div class="info">
        <h4>${e.type.charAt(0).toUpperCase()+e.type.slice(1)}</h4>
        <p>${e.date}${e.notes ? ' — '+e.notes : ''}</p>
      </div>
      <div class="duration">${e.duration} min</div>
      <button class="btn btn-danger btn-sm" onclick="deleteActivity('${e.id}','${petId}')">×</button>
    </div>
  `).join('');
}

async function deleteActivity(id, petId) {
  await fetch(API + '/api/activities?id=' + id, { method: 'DELETE' });
  loadActivities(petId);
}

document.getElementById('act-pet-select').addEventListener('change', e => {
  loadActivities(e.target.value);
});

// --- Chat (SSE) ---
async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  chatHistory.push({ role: 'user', content: msg });
  const box = document.getElementById('chat-messages');
  box.innerHTML += `<div class="msg user">${esc(msg)}</div>`;

  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'msg assistant';
  assistantDiv.textContent = '';
  box.appendChild(assistantDiv);
  box.scrollTop = box.scrollHeight;

  try {
    const r = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory })
    });

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const j = JSON.parse(data);
          const delta = j.choices?.[0]?.delta?.content || '';
          full += delta;
          assistantDiv.innerHTML = marked(full);
        } catch {}
      }
      box.scrollTop = box.scrollHeight;
    }
    chatHistory.push({ role: 'assistant', content: full });
  } catch (err) {
    assistantDiv.textContent = 'Oops, something went wrong. Please try again.';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Minimal marked-like rendering (bold, italic, code, newlines)
function marked(t) {
  return esc(t)
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.*?)\*/g, '<i>$1</i>')
    .replace(/`(.*?)`/g, '<code style="background:#EDE9FE;padding:2px 6px;border-radius:4px">$1</code>')
    .replace(/\n/g, '<br>');
}

loadPets();
